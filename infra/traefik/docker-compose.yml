---
# ─────────────────────────────────────────────────────────────────────────────
# LXC : docker-infra  |  IP : 10.0.0.51
# Service : Traefik — Reverse proxy LAN + TLS (Home-CA)
#
# Fichiers de config attendus sur l'hôte :
#   /opt/traefik/config/traefik.yml
#   /opt/traefik/config/services.yml
#   /opt/traefik/certs/           ← certificats signés par Home-CA
#   /opt/traefik/logs/
# ─────────────────────────────────────────────────────────────────────────────

services:

  traefik:
    image: traefik:latest
    container_name: traefik
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/traefik/config/traefik.yml:/etc/traefik/traefik.yml:ro
      - /opt/traefik/config/services.yml:/etc/traefik/services.yml:ro
      - /opt/traefik/certs:/etc/traefik/certs:ro
      - /opt/traefik/logs:/opt/traefik/logs
    networks:
      - traefik-net

networks:
  traefik-net:
    external: true
